<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vía51 - Laboratorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .phone { width: 360px; height: 740px; background: #020617; border: 12px solid #1e293b; border-radius: 3rem; overflow: hidden; display: flex; flex-direction: column; }
        .gold { color: #D4AF37; }
        .silver { color: #C0C2C9; }
        .btn-lang { padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 9px; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); flex: 1; text-align: center; }
        .active { background: #D4AF37; color: #000; border-color: #D4AF37; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #D4AF37; width: 65%; box-shadow: 0 0 10px #D4AF37; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="phone shadow-2xl">
        <div class="p-8 flex-1 flex flex-col justify-between">
            <header>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black gold uppercase tracking-widest">LIMA</span>
                    <span class="text-[10px] silver uppercase">visitante: <span id="visitor-count" class="text-white animate-pulse">...</span></span>
                </div>
                <!-- BOTONERA TRILINGÜE -->
                <div class="flex gap-2">
                    <button id="btn-es" onclick="setLanguage('ES')" class="btn-lang active">ESPAÑOL</button>
                    <button id="btn-qu" onclick="setLanguage('QU')" class="btn-lang">RUNA SIMI</button>
                    <button id="btn-en" onclick="setLanguage('EN')" class="btn-lang">ENGLISH</button>
                </div>
            </header>

            <main class="flex-1 flex flex-col justify-center text-center">
                <h1 class="text-3xl font-black gold leading-none mb-6 uppercase">VIA51<br/>HOLDING</h1>
                <p id="subtitle-text" class="text-[18.5px] font-medium silver leading-tight mb-8">
                    Hacer del Perú un país de bienestar y desarrollo sostenible de Calidad Mundial en una generación.
                </p>
                <!-- SIMULACIÓN DE AVANCE -->
                <div class="text-left">
                    <p id="progress-text" class="text-[9px] silver uppercase mb-2 tracking-widest">AVANCE DEL PROYECTO: 65%</p>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
                
                <!-- BOTÓN DE INGRESO 0 - C -->
                <button onclick="window.location.href='bienvenida.html'" class="mt-8 bg-gradient-to-r from-[#D4AF37] to-[#C0C2C9] text-black font-black uppercase py-3 rounded-2xl tracking-widest text-[12px] shadow-lg hover:scale-95 transition-transform">
                    0 - C
                </button>
            </main>

            <footer>
                <p id="mantra-text" class="text-[11px] silver italic text-center opacity-70">
                    "El dato es el átomo de la soberanía. Si el átomo es puro, los resultados son consistentes."
                </p>
            </footer>
        </div>
    </div>

    <script>
        // 1. DICCIONARIO TRILINGÜE (RAE, AMLQ, Oxford)
        const dict = {
            'ES': {
                subtitle: "Hacer del Perú un país de bienestar y desarrollo sostenible de Calidad Mundial en una generación.",
                progress: "AVANCE DEL PROYECTO: 65%",
                mantra: '"El dato es el átomo de la soberanía. Si el átomo es puro, los resultados son consistentes."'
            },
            'QU': {
                subtitle: "Piruw suyuta, sumaq kawsayniyuq, allin wiñariyniyuq, tiksimuyuntinpi aswan allin llaqtaman huk wiñaypi tukuchiy.",
                progress: "RUWAYKUNAQA ÑAWPAQMAN: 65%",
                mantra: '"Willakuyqa qhapaq suyup iñukunam. Iñuku ch\'uya kaptinqa, ruwaykunapas allinmi kanqa."'
            },
            'EN': {
                subtitle: "To make Peru a country of well-being and sustainable development of World-Class quality within one generation.",
                progress: "PROJECT PROGRESS: 65%",
                mantra: '"Data is the atom of sovereignty. If the atom is pure, the outcomes are consistent."'
            }
        };

        function setLanguage(lang) {
            // Actualizar botones
            ['ES', 'QU', 'EN'].forEach(l => {
                const btn = document.getElementById(`btn-${l.toLowerCase()}`);
                if(l === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Actualizar textos con transición fluida
            const subtitle = document.getElementById('subtitle-text');
            const progress = document.getElementById('progress-text');
            const mantra = document.getElementById('mantra-text');

            subtitle.style.opacity = 0; progress.style.opacity = 0; mantra.style.opacity = 0;
            setTimeout(() => {
                subtitle.innerText = dict[lang].subtitle;
                progress.innerText = dict[lang].progress;
                mantra.innerText = dict[lang].mantra;
                subtitle.style.opacity = 1; progress.style.opacity = 1; mantra.style.opacity = 1;
            }, 200);
        }

        // 2. CONEXIÓN SUPABASE (Contador Único)
        const SB_URL = "https://ibhhzgtxaqwdykedhtvk.supabase.co";
        const SB_KEY = "sb_publishable_BJ5ike7tqjI4oE_64Dw80w_wy4SkzaK"; // Pública (Safe for Read)

        async function fetchUniqueVisitors() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/city_visits?select=visitor_ip`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });
                const data = await res.json();
                
                // Calcular IPs únicas
                const uniqueIPs = new Set(data.map(d => d.visitor_ip)).size;
                
                // Extraer IP propia del usuario para no contar repetidos visualmente si no hay red
                document.getElementById('visitor-count').innerText = uniqueIPs.toLocaleString();
                document.getElementById('visitor-count').classList.remove('animate-pulse');
            } catch(e) {
                document.getElementById('visitor-count').innerText = "1,240"; // Fallback estético
            }
        }

        // Add transitions
        document.getElementById('subtitle-text').style.transition = "opacity 0.2s ease-in-out";
        document.getElementById('progress-text').style.transition = "opacity 0.2s ease-in-out";
        document.getElementById('mantra-text').style.transition = "opacity 0.2s ease-in-out";

        fetchUniqueVisitors();
    </script>
</body>
</html>
