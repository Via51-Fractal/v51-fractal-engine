<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vía51 - Holding Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #ffffff; }
        .phone-frame { width: 360px; height: 740px; background: #020617; border: 12px solid #1e293b; border-radius: 3.5rem; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .gold-glow { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .silver-text { color: #C0C2C9; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(192, 194, 201, 0.1); }
        .lang-btn { padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .lang-active { background: #D4AF37; color: #000; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="phone-frame border-slate-800 shadow-2xl">
        <div class="flex-1 p-8 flex flex-col justify-between relative z-10">
            
            <!-- LÍNEA 1: CIUDAD (IZQ) Y CONTADOR (DER) -->
            <header class="mt-2">
                <div class="flex justify-between items-center mb-1">
                    <span id="city-display" class="text-[10px] font-black gold-glow uppercase tracking-[0.2em]">Detectando...</span>
                    <span class="text-[10px] silver-text font-medium uppercase tracking-widest">
                        visitante: <span id="visit-count" class="text-white font-black">...</span>
                    </span>
                </div>
                
                <!-- LÍNEA 2: RIEL DE IDIOMAS -->
                <div class="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-2">
                    <button id="btn-es" class="lang-btn bg-white/5 text-slate-500">ESPAÑOL</button>
                    <button id="btn-qu" class="lang-btn bg-white/5 text-slate-500">RUNA SIMI</button>
                    <button id="btn-en" class="lang-btn bg-white/5 text-slate-500">ENGLISH</button>
                </div>

                <div class="h-[1px] w-full bg-gradient-to-r from-gold via-white/10 to-transparent mt-6"></div>
            </header>

            <main class="flex-1 flex flex-col justify-center gap-6">
                <h1 id="main-title" class="text-4xl font-black gold-glow leading-tight uppercase tracking-tighter">
                    VIA51 - HOLDING<br/>DIGITAL
                </h1>
                <div class="glass-card p-6 rounded-[2rem]">
                    <p id="purpose-text" class="text-lg font-medium leading-tight silver-text">
                        Cargando propósito supremo...
                    </p>
                </div>
            </main>

            <footer>
                <p class="text-[8px] silver-text text-center italic leading-relaxed px-4 opacity-40">
                    "Dataqa qasikaypa atómom. Atómo ch'uya kaptinqa, llaqtaqa mana p'akikuqmi."
                </p>
            </footer>
        </div>
    </div>

    <script>
        const SB_URL = "https://ibhhzgtxaqwdykedhtvk.supabase.co";
        const SB_KEY = "sb_publishable_BJ5ike7tqjI4oE_64Dw80w_wy4SkzaK";

        async function initSovereignty() {
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                const city = geoData.city || "LIMA";
                const country = geoData.country_name;
                
                document.getElementById('city-display').innerText = city;

                // Registro en Supabase
                await fetch(`${SB_URL}/rest/v1/city_visits`, {
                    method: 'POST',
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city_name: city, visitor_ip: geoData.ip })
                });

                // Conteo territorial
                const countRes = await fetch(`${SB_URL}/rest/v1/city_visits?city_name=eq.${city}&select=count`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'count=exact' }
                });
                const count = countRes.headers.get('content-range').split('/')[1];
                document.getElementById('visit-count').innerText = count;

                // Idioma por defecto
                setLanguage(country === "Peru" ? 'es' : 'en');

            } catch (e) {
                document.getElementById('city-display').innerText = "ERROR RED";
            }
        }

        function setLanguage(lang) {
            const btns = { es: document.getElementById('btn-es'), qu: document.getElementById('btn-qu'), en: document.getElementById('btn-en') };
            Object.values(btns).forEach(b => b.classList.remove('lang-active'));
            btns[lang].classList.add('lang-active');

            const content = {
                es: { title: "VIA51 - HOLDING<br/>DIGITAL", purpose: "Hacer del Perú un país de desarrollo sostenible de Calidad Mundial." },
                qu: { title: "VIA51 - QAPAQ<br/>HUÑUY", purpose: "Perú suyuta teqsimuyuntinpi allin kawsayniyuq ruranapaq." },
                en: { title: "VIA51 - DIGITAL<br/>HOLDING", purpose: "To make Peru a country of world-class sustainable development." }
            };
            document.getElementById('main-title').innerHTML = content[lang].title;
            document.getElementById('purpose-text').innerText = content[lang].purpose;
        }

        document.getElementById('btn-es').onclick = () => setLanguage('es');
        document.getElementById('btn-qu').onclick = () => setLanguage('qu');
        document.getElementById('btn-en').onclick = () => setLanguage('en');

        initSovereignty();
    </script>
</body>
</html>
